<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carosello Scorrimento</title>
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main>
    <h1>Esempio Non Carosello</h1>

    <section class="carousel-container" aria-roledescription="carousel" aria-label="Contenuti in evidenza">
      
      <div class="carousel-controls">
        <button id="btnPrev" aria-label="Scorri visivamente indietro">Precedente</button>
        <button id="btnNext" aria-label="Scorri visivamente in avanti">Successivo</button>
      </div>

      <ul id="carouselList" class="carousel-list">
        <li class="carousel-item" aria-roledescription="slide">
          <div class="card">Card 1 <br><a href="#">Link 1</a></div>
        </li>
        <li class="carousel-item" aria-roledescription="slide">
          <div class="card">Card 2 <br><a href="#">Link 2</a></div>
        </li>
        <li class="carousel-item" aria-roledescription="slide">
          <div class="card">Card 3 <br><a href="#">Link 3</a></div>
        </li>
        <li class="carousel-item" aria-roledescription="slide">
          <div class="card">Card 4 <br><a href="#">Link 4</a></div>
        </li>
        <li class="carousel-item" aria-roledescription="slide">
          <div class="card">Card 5 <br><a href="#">Link 5</a></div>
        </li>
        <li class="carousel-item" aria-roledescription="slide">
          <div class="card">Card 6 <br><a href="#">Link 6</a></div>
        </li>
      </ul>

      <div id="carouselAnnouncer" class="sr-only" aria-live="polite" aria-atomic="true">
        Visualizzate card da 1 a 3 di 6.
      </div>

    </section>
    </main>

  <script src="script.js"></script>
  
</body>
</html>
